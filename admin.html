<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パティオ 管理画面</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f0f2f5;color:#333}

    /* ログイン */
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#23222f}
    #login-box{background:#fff;border-radius:12px;padding:40px;width:340px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3)}
    #login-box h1{font-size:20px;margin-bottom:8px;color:#23222f}
    #login-box p{font-size:13px;color:#888;margin-bottom:24px}
    #login-box input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:12px}
    #login-box button{width:100%;padding:12px;background:#4bb6c5;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer}
    #login-error{color:#e74c3c;font-size:13px;margin-top:8px}

    /* メイン */
    #main-screen{display:none}
    header{background:#23222f;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
    header h1{font-size:18px}
    .logout-btn{background:transparent;border:1px solid #666;color:#ccc;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px}

    .toolbar{background:#fff;padding:16px 24px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .btn-primary{background:#4bb6c5;color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold}
    .btn-primary:hover{background:#3aa0af}
    .btn-success{background:#27ae60;color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold}
    .btn-success:hover{background:#219a52}
    .btn-folder{background:#8e44ad;color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14px}
    .btn-folder:hover{background:#7d3c98}
    .search-box{padding:9px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;width:200px}
    .folder-status{font-size:12px;color:#888;padding:4px 10px;background:#f5f5f5;border-radius:6px}
    .folder-status.ok{color:#27ae60;background:#eafaf1}

    /* グリッド */
    .cast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;padding:24px}
    .cast-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .2s}
    .cast-card:hover{transform:translateY(-2px)}
    .cast-card img{width:100%;aspect-ratio:3/4;object-fit:cover;background:#eee}
    .card-body{padding:12px}
    .card-name{font-weight:bold;font-size:14px;margin-bottom:4px}
    .card-cats{font-size:11px;color:#888;margin-bottom:10px;line-height:1.4}
    .card-actions{display:flex;gap:6px}
    .btn-edit{flex:1;padding:6px;background:#f0f0f0;border:none;border-radius:6px;cursor:pointer;font-size:12px}
    .btn-edit:hover{background:#e0e0e0}
    .btn-del{padding:6px 10px;background:#fdecea;border:none;border-radius:6px;cursor:pointer;font-size:12px;color:#e74c3c}
    .btn-del:hover{background:#fad7d3}

    /* モーダル */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:30px 16px}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:12px;width:100%;max-width:1200px;padding:28px;position:relative}
    .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#999}
    .modal h2{font-size:18px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #eee}

    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:13px;font-weight:bold;margin-bottom:6px;color:#555}
    .form-group input[type=text],.form-group input[type=number],.form-group textarea,.form-group select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
    .form-group textarea{resize:vertical;min-height:80px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-hint{font-size:11px;color:#999;margin-top:4px}

    /* チェックボックスグループ */
    .check-group{display:flex;flex-wrap:wrap;gap:8px;padding:10px;border:1px solid #ddd;border-radius:8px;background:#fafafa}
    .check-item{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer}
    .check-item input{cursor:pointer;width:15px;height:15px}
    .check-custom{display:flex;gap:6px;margin-top:8px}
    .check-custom input[type=text]{flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px}
    .check-custom button{padding:7px 12px;background:#eee;border:none;border-radius:6px;cursor:pointer;font-size:13px}
    .check-custom button:hover{background:#ddd}
    .custom-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
    .tag{background:#e8f4f8;color:#2980b9;padding:3px 10px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:4px}
    .tag .rm{cursor:pointer;color:#999;font-size:14px}

    /* ファイルアップロード */
    .file-upload-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .file-upload-grid.audio-grid{grid-template-columns:repeat(3,1fr)}
    .file-slot{border:2px dashed #ddd;border-radius:8px;padding:10px;text-align:center;position:relative;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
    .file-slot img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:4px}
    .file-slot .slot-label{font-size:11px;color:#999}
    .file-slot .slot-name{font-size:10px;color:#555;word-break:break-all;max-width:100%}
    .file-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .file-slot .btn-clear-file{position:absolute;top:4px;right:4px;background:#e74c3c;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:none;z-index:2;line-height:20px;text-align:center}
    .file-slot.has-file .btn-clear-file{display:block}
    .file-slot.has-file{border-color:#4bb6c5}
    .audio-slot{border:2px dashed #ddd;border-radius:8px;padding:12px;min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
    .audio-slot .slot-label{font-size:11px;color:#999}
    .audio-slot .slot-name{font-size:11px;color:#555;word-break:break-all;text-align:center;max-width:100%}
    .audio-slot.empty{position:relative;cursor:pointer}
    .audio-slot.empty input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .audio-slot.has-file{border-color:#4bb6c5;position:relative}
    .audio-slot audio{width:100%;height:36px}
    .audio-slot-btns{display:flex;gap:6px;margin-top:4px;width:100%}
    .btn-change-file{flex:1;padding:5px;background:#f0f0f0;border:none;border-radius:6px;cursor:pointer;font-size:11px;position:relative;overflow:hidden}
    .btn-change-file input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
    .btn-clear-audio{padding:5px 8px;background:#fdecea;color:#e74c3c;border:none;border-radius:6px;cursor:pointer;font-size:11px}

    .modal-footer{margin-top:24px;display:flex;gap:10px;justify-content:flex-end}
    .btn-cancel{padding:10px 20px;background:#f0f0f0;border:none;border-radius:8px;cursor:pointer;font-size:14px}
    .btn-submit{padding:10px 24px;background:#4bb6c5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold}

    /* 保存ガイド */
    #save-guide{display:none;position:fixed;bottom:24px;right:24px;background:#27ae60;color:#fff;border-radius:10px;padding:16px 20px;max-width:340px;box-shadow:0 4px 16px rgba(0,0,0,.2);font-size:13px;line-height:1.7;z-index:2000}
    #save-guide strong{display:block;font-size:14px;margin-bottom:6px}
    #save-guide .close-guide{float:right;background:none;border:none;color:#fff;cursor:pointer;font-size:18px;margin-top:-4px}
  </style>
</head>
<body>

<!-- ログイン -->
<div id="login-screen">
  <div id="login-box">
    <h1>🔑 パティオ 管理画面</h1>
    <p>パスワードを入力してください</p>
    <input type="password" id="pw-input" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">ログイン</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- メイン -->
<div id="main-screen">
  <header>
    <h1>🎤 パティオ キャスト管理</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="header-count" style="font-size:13px;color:#aaa"></span>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </header>

  <div class="toolbar">
    <button class="btn-primary" onclick="openAddModal()">＋ キャストを追加</button>
    <button class="btn-success" onclick="saveData()">💾 cast-data.js を保存</button>
    <button class="btn-folder" onclick="pickFolder()" id="folder-btn">📁 保存先フォルダを選択</button>
    <span class="folder-status" id="folder-status">未選択（ファイルアップロード前に選択してください）</span>
    <input type="text" class="search-box" id="search-input" placeholder="名前・カテゴリで検索..." oninput="renderGrid()">
    <span style="font-size:13px;color:#888;margin-left:auto" id="count-label"></span>
  </div>

  <div class="cast-grid" id="cast-grid"></div>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-title">キャスト編集</h2>
    <input type="hidden" id="f-id">

    <div class="form-row">
      <div class="form-group">
        <label>名前 *</label>
        <input type="text" id="f-name" placeholder="山田 花子">
      </div>
      <div class="form-group">
        <label>並び順（数字）</label>
        <input type="number" id="f-order" placeholder="0">
      </div>
    </div>

    <!-- 性別 -->
    <div class="form-group">
      <label>性別</label>
      <select id="f-sex">
        <option value="女性">女性</option>
        <option value="男性">男性</option>
        <option value="その他">その他</option>
      </select>
    </div>

    <!-- カテゴリ -->
    <div class="form-group">
      <label>カテゴリ（複数選択可）</label>
      <div class="check-group" id="check-categories">
        <label class="check-item"><input type="checkbox" value="MC/司会"> MC/司会</label>
        <label class="check-item"><input type="checkbox" value="アナウンサー"> アナウンサー</label>
        <label class="check-item"><input type="checkbox" value="ナレーター"> ナレーター</label>
        <label class="check-item"><input type="checkbox" value="コンパニオン"> コンパニオン</label>
        <label class="check-item"><input type="checkbox" value="モデル"> モデル</label>
        <label class="check-item"><input type="checkbox" value="役者"> 役者</label>
        <label class="check-item"><input type="checkbox" value="声優"> 声優</label>
        <label class="check-item"><input type="checkbox" value="ラジオDJ"> ラジオDJ</label>
        <label class="check-item"><input type="checkbox" value="宅録"> 宅録</label>
        <label class="check-item"><input type="checkbox" value="講師"> 講師</label>
      </div>
      <div class="check-custom">
        <input type="text" id="cat-custom" placeholder="その他のカテゴリを追加...">
        <button onclick="addCustomTag('categories')">追加</button>
      </div>
      <div class="custom-tags" id="custom-tags-categories"></div>
    </div>

    <!-- 年代 -->
    <div class="form-group">
      <label>年代</label>
      <div class="check-group" id="check-ages">
        <label class="check-item"><input type="checkbox" value="10代以下"> 10代以下</label>
        <label class="check-item"><input type="checkbox" value="20~30代"> 20〜30代</label>
        <label class="check-item"><input type="checkbox" value="40代以上"> 40代以上</label>
      </div>
    </div>

    <!-- 対応地域 -->
    <div class="form-group">
      <label>対応地域</label>
      <div class="check-group" id="check-regions">
        <label class="check-item"><input type="checkbox" value="関東"> 関東</label>
        <label class="check-item"><input type="checkbox" value="関西"> 関西</label>
        <label class="check-item"><input type="checkbox" value="その他"> その他</label>
      </div>
      <div class="check-custom">
        <input type="text" id="region-custom" placeholder="その他の地域を追加...">
        <button onclick="addCustomTag('regions')">追加</button>
      </div>
      <div class="custom-tags" id="custom-tags-regions"></div>
    </div>

    <!-- 対応言語 -->
    <div class="form-group">
      <label>対応言語</label>
      <div class="check-group" id="check-languages">
        <label class="check-item"><input type="checkbox" value="英語"> 英語</label>
        <label class="check-item"><input type="checkbox" value="中国語"> 中国語</label>
        <label class="check-item"><input type="checkbox" value="バイリンガル"> バイリンガル</label>
      </div>
      <div class="check-custom">
        <input type="text" id="lang-custom" placeholder="その他の言語を追加...">
        <button onclick="addCustomTag('languages')">追加</button>
      </div>
      <div class="custom-tags" id="custom-tags-languages"></div>
    </div>

    <!-- 写真 -->
    <div class="form-group">
      <label>プロフィール写真（最大4枚）</label>
      <p class="form-hint" style="margin-bottom:8px">📁 保存先フォルダを選択した状態でファイルを選ぶと、uploadsフォルダに自動保存されます</p>
      <div class="file-upload-grid" id="photo-slots"></div>
    </div>

    <!-- 身長 -->
    <div class="form-group">
      <label>身長（cm）</label>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="number" id="f-height" min="100" max="220" placeholder="163" style="width:120px">
        <span style="font-size:13px;color:#888">cm</span>
      </div>
    </div>

    <!-- 趣味・特技 -->
    <div class="form-row">
      <div class="form-group">
        <label>趣味</label>
        <textarea id="f-hobbies" rows="8" placeholder="食べ歩き&#10;旅行&#10;..."></textarea>
      </div>
      <div class="form-group">
        <label>特技</label>
        <textarea id="f-skills" rows="8" placeholder="ジャズダンス&#10;三点倒立&#10;..."></textarea>
      </div>
    </div>

    <!-- 資格 -->
    <div class="form-group">
      <label>資格</label>
      <textarea id="f-qualifications" rows="8" placeholder="普通自動車免許&#10;英語検定2級&#10;..."></textarea>
    </div>

    <!-- ボイスサンプル -->
    <div class="form-group">
      <label>ボイスサンプル（最大3つ）</label>
      <div class="file-upload-grid audio-grid" id="audio-slots"></div>
    </div>

    <!-- SNS -->
    <div class="form-group">
      <label>Instagram</label>
      <input type="text" id="f-sns-instagram" placeholder="https://www.instagram.com/...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Twitter / X</label>
        <input type="text" id="f-sns-twitter" placeholder="https://twitter.com/...">
      </div>
      <div class="form-group">
        <label>YouTube</label>
        <input type="text" id="f-sns-youtube" placeholder="https://youtube.com/...">
      </div>
    </div>

    <!-- 経歴 -->
    <div class="form-group">
      <label>経歴</label>
      <p class="form-hint" style="margin-bottom:8px">「【見出し】タイトル」で見出し、「・内容」で項目を入力してください。サイトでは左右2カラムで表示されます。</p>
      <div class="form-row">
        <div>
          <label style="font-size:12px;color:#4bb6c5;font-weight:normal;margin-bottom:4px;display:block">◀ 左カラム</label>
          <textarea id="f-career-left" style="height:800px" placeholder="【見出し】テレビ出演&#10;・〇〇番組（TBS）&#10;・△△番組（NTV）&#10;&#10;【見出し】MC実績&#10;・展示会MC"></textarea>
        </div>
        <div>
          <label style="font-size:12px;color:#e67e22;font-weight:normal;margin-bottom:4px;display:block">▶ 右カラム</label>
          <textarea id="f-career-right" style="height:800px" placeholder="【見出し】モデル&#10;・雑誌モデル&#10;&#10;【見出し】その他"></textarea>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-submit" onclick="submitForm()">保存</button>
    </div>
  </div>
</div>

<!-- 保存ガイド -->
<div id="save-guide">
  <button class="close-guide" onclick="document.getElementById('save-guide').style.display='none'">✕</button>
  <strong>✅ cast-data.js をダウンロードしました</strong>
  次の手順でサイトに反映してください：<br>
  1. ダウンロードしたファイルを <code>js/</code> フォルダに上書き<br>
  2. GitHub Desktop で「Commit」→「Push」
</div>

<script>
// ============================================================
// 設定
// ============================================================
const PASSWORD = 'patio2024';
const CUSTOM_FIELD_MAP = {
  categories: { checkId: 'check-categories', customInputId: 'cat-custom' },
  regions:    { checkId: 'check-regions',    customInputId: 'region-custom' },
  languages:  { checkId: 'check-languages',  customInputId: 'lang-custom' },
};

// ============================================================
// 状態
// ============================================================
let castData = [];
let editingId = null;
let rootDirHandle = null;
// 写真・音声のスロット状態 { path: string, file: File|null }
let photoSlots = [{},{},{},{}];
let audioSlots = [{},{},{}];

// ============================================================
// ログイン
// ============================================================
function doLogin() {
  if (document.getElementById('pw-input').value === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').textContent = 'パスワードが違います';
  }
}
function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('pw-input').value = '';
}

// ============================================================
// フォルダ選択（File System Access API）
// ============================================================
async function pickFolder() {
  if (!window.showDirectoryPicker) {
    alert('このブラウザはフォルダ選択に対応していません。\nGoogle Chrome または Edge をお使いください。');
    return;
  }
  try {
    rootDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    document.getElementById('folder-status').textContent = '✅ ' + rootDirHandle.name;
    document.getElementById('folder-status').className = 'folder-status ok';
  } catch(e) {
    if (e.name !== 'AbortError') alert('フォルダの選択に失敗しました: ' + e.message);
  }
}

async function saveFileToUploads(file, castId, index, type) {
  if (!rootDirHandle) return null;
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const ext = file.name.split('.').pop();
  const safeName = `cast_${castId}_${type}${index + 1}.${ext}`;
  const subPath = `uploads/${yyyy}/${mm}/${safeName}`;
  try {
    let dir = rootDirHandle;
    for (const part of ['uploads', String(yyyy), mm]) {
      dir = await dir.getDirectoryHandle(part, { create: true });
    }
    const fh = await dir.getFileHandle(safeName, { create: true });
    const w = await fh.createWritable();
    await w.write(file);
    await w.close();
    return subPath;
  } catch(e) {
    console.error('ファイル保存エラー:', e);
    return null;
  }
}

// ============================================================
// データ読み込み
// ============================================================
function loadData() {
  fetch('js/cast-data.js')
    .then(r => r.text())
    .then(text => {
      const json = text.replace(/^const CAST_DATA\s*=\s*/, '').replace(/;\s*$/, '');
      castData = JSON.parse(json);
      renderGrid();
    })
    .catch(() => {
      castData = [];
      renderGrid();
      alert('cast-data.js の読み込みに失敗しました。\nGitHub Pages上か、ローカルサーバー経由で開いてください。');
    });
}

// ============================================================
// 一覧
// ============================================================
function renderGrid() {
  const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const filtered = q
    ? castData.filter(c =>
        c.name.toLowerCase().includes(q) ||
        (c.categories || []).join('').toLowerCase().includes(q) ||
        (c.career || '').toLowerCase().includes(q))
    : castData;
  document.getElementById('count-label').textContent = `${filtered.length} / ${castData.length} 件`;
  document.getElementById('header-count').textContent = `合計 ${castData.length} 名`;
  document.getElementById('cast-grid').innerHTML = filtered.map(c => `
    <div class="cast-card">
      <img src="${(c.images && c.images[0]) || c.image || ''}" alt="${c.name}"
        onerror="this.style.background='#ddd';this.removeAttribute('src')">
      <div class="card-body">
        <div class="card-name">${c.name}</div>
        <div class="card-cats">${(c.categories || []).join(' / ') || ''}</div>
        <div class="card-actions">
          <button class="btn-edit" onclick="openEditModal(${c.id})">✏️ 編集</button>
          <button class="btn-del" onclick="deleteCast(${c.id})">🗑</button>
        </div>
      </div>
    </div>`).join('');
}

// ============================================================
// チェックボックス操作
// ============================================================
function getChecked(checkGroupId) {
  return [...document.querySelectorAll(`#${checkGroupId} input[type=checkbox]:checked`)].map(el => el.value);
}
function setChecked(checkGroupId, values) {
  document.querySelectorAll(`#${checkGroupId} input[type=checkbox]`).forEach(el => {
    el.checked = values.includes(el.value);
  });
}

// カスタムタグ
let customTags = { categories: [], regions: [], languages: [] };

function addCustomTag(field) {
  const inputMap = { categories: 'cat-custom', regions: 'region-custom', languages: 'lang-custom' };
  const input = document.getElementById(inputMap[field]);
  const val = input.value.trim();
  if (!val) return;
  // チェックボックスに既にある値なら無視
  const exists = [...document.querySelectorAll(`#check-${field} input`)].some(el => el.value === val);
  if (!exists && !customTags[field].includes(val)) {
    customTags[field].push(val);
    renderCustomTags(field);
  }
  input.value = '';
}
function removeCustomTag(field, idx) {
  customTags[field].splice(idx, 1);
  renderCustomTags(field);
}
function renderCustomTags(field) {
  document.getElementById(`custom-tags-${field}`).innerHTML =
    customTags[field].map((t, i) =>
      `<span class="tag">${t} <span class="rm" onclick="removeCustomTag('${field}',${i})">×</span></span>`
    ).join('');
}
function getAllSelected(field) {
  const checked = getChecked(`check-${field}`);
  return [...checked, ...customTags[field]];
}

// ============================================================
// 写真・音声スロット
// ============================================================
function renderPhotoSlots() {
  document.getElementById('photo-slots').innerHTML = photoSlots.map((slot, i) => `
    <div class="file-slot ${slot.path ? 'has-file' : ''}" id="photo-slot-${i}">
      ${slot.path ? `<img src="${slot.path}" onerror="this.style.display='none'">` : `<span class="slot-label">📷 写真${i+1}</span>`}
      ${slot.path ? `<span class="slot-name">${slot.displayName || slot.path.split('/').pop()}</span>` : ''}
      <input type="file" accept="image/*" onchange="onPhotoChange(event,${i})">
      <button class="btn-clear-file" onclick="clearPhoto(${i})">✕</button>
    </div>`).join('');
}
function renderAudioSlots() {
  document.getElementById('audio-slots').innerHTML = audioSlots.map((slot, i) => {
    if (slot.path && !slot.isBlob) {
      // サーバー上のファイル：プレーヤー表示
      return `
        <div class="audio-slot has-file" id="audio-slot-${i}">
          <span style="font-size:18px">🎵</span>
          <span class="slot-name">${slot.displayName || slot.path.split('/').pop()}</span>
          <audio controls src="${slot.path}"></audio>
          <div class="audio-slot-btns">
            <button class="btn-change-file">📂 変更
              <input type="file" accept="audio/*" onchange="onAudioChange(event,${i})">
            </button>
            <button class="btn-clear-audio" onclick="clearAudio(${i})">🗑 削除</button>
          </div>
        </div>`;
    } else if (slot.file && slot.isBlob) {
      // ローカルファイル選択済み（フォルダ未選択）：プレーヤー表示
      const blobUrl = slot.blobUrl || (slot.blobUrl = URL.createObjectURL(slot.file));
      return `
        <div class="audio-slot has-file" id="audio-slot-${i}">
          <span style="font-size:18px">🎵</span>
          <span class="slot-name">${slot.displayName}</span>
          <audio controls src="${blobUrl}"></audio>
          <p style="font-size:10px;color:#e67e22;text-align:center">📁 フォルダ選択後に保存されます</p>
          <div class="audio-slot-btns">
            <button class="btn-change-file">📂 変更
              <input type="file" accept="audio/*" onchange="onAudioChange(event,${i})">
            </button>
            <button class="btn-clear-audio" onclick="clearAudio(${i})">🗑 削除</button>
          </div>
        </div>`;
    } else {
      // 未選択 — labelで包むことでクリック確実に反応
      return `
        <div class="audio-slot empty" id="audio-slot-${i}">
          <label style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:100%;height:100%;cursor:pointer;margin:0">
            <span style="font-size:24px">🎤</span>
            <span class="slot-label">ボイスサンプル${i+1}<br>クリックして選択</span>
            <input type="file" accept="audio/*" style="display:none" onchange="onAudioChange(event,${i})">
          </label>
        </div>`;
    }
  }).join('');
}
async function onPhotoChange(event, idx) {
  const file = event.target.files[0];
  if (!file) return;
  if (rootDirHandle) {
    const id = editingId || ('new_' + Date.now());
    const path = await saveFileToUploads(file, id, idx, 'photo');
    if (path) {
      photoSlots[idx] = { path, displayName: file.name, file };
      renderPhotoSlots();
      return;
    }
  }
  // フォルダ未選択の場合はプレビューのみ
  const url = URL.createObjectURL(file);
  photoSlots[idx] = { path: url, displayName: file.name, file, isBlob: true };
  renderPhotoSlots();
}
async function onAudioChange(event, idx) {
  const file = event.target.files[0];
  if (!file) return;
  if (rootDirHandle) {
    const id = editingId || ('new_' + Date.now());
    const path = await saveFileToUploads(file, id, idx, 'audio');
    if (path) {
      audioSlots[idx] = { path, displayName: file.name, file };
      renderAudioSlots();
      return;
    }
  }
  audioSlots[idx] = { path: 'selected', displayName: file.name, file, isBlob: true };
  renderAudioSlots();
}
function clearPhoto(idx) {
  event.stopPropagation();
  photoSlots[idx] = {};
  renderPhotoSlots();
}
function clearAudio(idx) {
  event.stopPropagation();
  audioSlots[idx] = {};
  renderAudioSlots();
}

// ============================================================
// プロフィールHTMLから写真・経歴を読み込む
// ============================================================
async function loadFromProfileHTML(id) {
  try {
    const res = await fetch(`profile/${id}.html`);
    if (!res.ok) return null;
    const text = await res.text();
    const doc = new DOMParser().parseFromString(text, 'text/html');

    // 写真（ギャラリーのメイン画像）
    const imgEls = doc.querySelectorAll('.staff-profile__mainimg img.js-main-target');
    const images = [...imgEls].map(el => el.getAttribute('src')).filter(Boolean);

    // 音声
    const audioEl = doc.querySelector('audio[src]');
    const audios = audioEl ? [audioEl.getAttribute('src')] : [];


    // 2カラムに分割
    const careerLists = doc.querySelectorAll('.staff-career__list');
    function parseCareerList(el) {
      if (!el) return '';
      const lines = [];
      el.querySelectorAll('.staff-career__name').forEach(name => {
        lines.push('【見出し】' + name.textContent.trim());
        const ul = name.nextElementSibling;
        if (ul && ul.classList.contains('staff-career__text')) {
          ul.querySelectorAll('li').forEach(li => {
            const t = li.textContent.trim();
            if (t) lines.push('・' + t);
          });
        }
      });
      return lines.join('\n');
    }
    const careerLeft = parseCareerList(careerLists[0]);
    const careerRight = parseCareerList(careerLists[1]);

    return { images, audios, careerLeft, careerRight };
  } catch(e) {
    return null;
  }
}

// ============================================================
// モーダル
// ============================================================
function resetForm() {
  document.getElementById('f-name').value = '';
  document.getElementById('f-order').value = '0';
  document.getElementById('f-sex').value = '女性';
  document.getElementById('f-height').value = '';
  document.getElementById('f-hobbies').value = '';
  document.getElementById('f-skills').value = '';
  document.getElementById('f-qualifications').value = '';
  document.getElementById('f-career-left').value = '';
  document.getElementById('f-career-right').value = '';
  document.getElementById('f-sns-instagram').value = '';
  document.getElementById('f-sns-twitter').value = '';
  document.getElementById('f-sns-youtube').value = '';
  ['categories','ages','regions','languages'].forEach(f => {
    setChecked('check-' + f, []);
  });
  customTags = { categories: [], regions: [], languages: [] };
  ['categories','regions','languages'].forEach(f => renderCustomTags(f));
  photoSlots = [{},{},{},{}];
  audioSlots = [{},{},{}];
  renderPhotoSlots();
  renderAudioSlots();
}
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'キャストを追加';
  document.getElementById('f-id').value = '';
  resetForm();
  document.getElementById('edit-modal').classList.add('open');
}
function openEditModal(id) {
  const c = castData.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'キャスト編集：' + c.name;
  document.getElementById('f-id').value = c.id;
  document.getElementById('f-name').value = c.name || '';
  document.getElementById('f-order').value = c.order ?? 0;
  document.getElementById('f-sex').value = c.sex || '女性';
  document.getElementById('f-height').value = c.height || '';
  document.getElementById('f-hobbies').value = c.hobbies || '';
  document.getElementById('f-skills').value = c.skills || '';
  document.getElementById('f-qualifications').value = c.qualifications || '';
  document.getElementById('f-career-left').value = c.careerLeft || '';
  document.getElementById('f-career-right').value = c.careerRight || '';
  document.getElementById('f-sns-instagram').value = (c.sns && c.sns.instagram) || '';
  document.getElementById('f-sns-twitter').value = (c.sns && c.sns.twitter) || '';
  document.getElementById('f-sns-youtube').value = (c.sns && c.sns.youtube) || '';

  // チェックボックス
  const PRESET_CATS = ['MC/司会','アナウンサー','ナレーター','コンパニオン','モデル','役者','声優','ラジオDJ','宅録','講師'];
  const PRESET_LANGS = ['英語','中国語','バイリンガル'];
  const PRESET_REGIONS = ['関東','関西','その他'];
  const cats = c.categories || [];
  setChecked('check-categories', cats.filter(v => PRESET_CATS.includes(v)));
  customTags.categories = cats.filter(v => !PRESET_CATS.includes(v));
  setChecked('check-ages', c.ages || []);
  const regions = c.regions || [];
  setChecked('check-regions', regions.filter(v => PRESET_REGIONS.includes(v)));
  customTags.regions = regions.filter(v => !PRESET_REGIONS.includes(v));
  const langs = c.languages || [];
  setChecked('check-languages', langs.filter(v => PRESET_LANGS.includes(v)));
  customTags.languages = langs.filter(v => !PRESET_LANGS.includes(v));
  ['categories','regions','languages'].forEach(f => renderCustomTags(f));

  // 写真・音声：cast-data.jsにimages[]があればそれを使い、なければprofileHTMLから読み込む
  const hasMultiImages = c.images && c.images.length > 1;
  const hasCareer = !!(c.careerLeft || c.careerRight);

  const imgs = c.images || (c.image ? [c.image] : []);
  photoSlots = [{},{},{},{}];
  imgs.slice(0,4).forEach((p,i) => { photoSlots[i] = { path: p, displayName: p.split('/').pop() }; });

  const auds = c.audios || (c.audio ? [c.audio] : []);
  audioSlots = [{},{},{}];
  auds.slice(0,3).forEach((p,i) => { audioSlots[i] = { path: p, displayName: p.split('/').pop() }; });

  renderPhotoSlots();
  renderAudioSlots();
  document.getElementById('edit-modal').classList.add('open');

  // プロフィールHTMLから補完（写真が1枚のみ or 経歴が未設定の場合）
  if (!hasMultiImages || !hasCareer) {
    loadFromProfileHTML(id).then(data => {
      if (!data) return;
      // 写真補完
      if (!hasMultiImages && data.images.length > 0) {
        photoSlots = [{},{},{},{}];
        data.images.slice(0,4).forEach((p,i) => { photoSlots[i] = { path: p, displayName: p.split('/').pop() }; });
        renderPhotoSlots();
      }
      // 音声補完
      if (auds.length === 0 && data.audios.length > 0) {
        audioSlots = [{},{},{}];
        data.audios.slice(0,3).forEach((p,i) => { audioSlots[i] = { path: p, displayName: p.split('/').pop() }; });
        renderAudioSlots();
      }
      // 経歴補完
      if (!hasCareer) {
        if (data.careerLeft) document.getElementById('f-career-left').value = data.careerLeft;
        if (data.careerRight) document.getElementById('f-career-right').value = data.careerRight;
      }
    });
  }
}
function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
}

async function submitForm() {
  try {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('名前は必須です'); return; }

  const id = editingId || Date.now();

  // フォルダ選択済みの場合、blobのファイルを保存
  if (rootDirHandle) {
    for (let i = 0; i < 4; i++) {
      if (photoSlots[i].file && photoSlots[i].isBlob) {
        const path = await saveFileToUploads(photoSlots[i].file, id, i, 'photo');
        if (path) photoSlots[i] = { ...photoSlots[i], path, isBlob: false };
      }
    }
    for (let i = 0; i < 3; i++) {
      if (audioSlots[i].file && audioSlots[i].isBlob) {
        const path = await saveFileToUploads(audioSlots[i].file, id, i, 'audio');
        if (path) audioSlots[i] = { ...audioSlots[i], path, isBlob: false };
      }
    }
  }

  const images = photoSlots.map(s => s.path).filter(p => p && !p.startsWith('blob:'));
  const audios = audioSlots.map(s => s.path).filter(p => p && p !== 'selected' && !p.startsWith('blob:'));
  const categories = getAllSelected('categories');

  const entry = {
    id,
    name,
    order: parseInt(document.getElementById('f-order').value) || 0,
    career: categories.join('、'),
    height: document.getElementById('f-height').value ? Number(document.getElementById('f-height').value) : null,
    hobbies: document.getElementById('f-hobbies').value.trim(),
    skills: document.getElementById('f-skills').value.trim(),
    qualifications: document.getElementById('f-qualifications').value.trim(),
    careerLeft: document.getElementById('f-career-left').value.trim(),
    careerRight: document.getElementById('f-career-right').value.trim(),
    sex: document.getElementById('f-sex').value,
    ages: getAllSelected('ages'),
    categories,
    languages: getAllSelected('languages'),
    regions: getAllSelected('regions'),
    image: images[0] || '',
    images,
    audio: audios[0] || '',
    audios,
    sns: {
      instagram: document.getElementById('f-sns-instagram').value.trim(),
      twitter: document.getElementById('f-sns-twitter').value.trim(),
      youtube: document.getElementById('f-sns-youtube').value.trim(),
      facebook: (castData.find(x=>x.id===editingId)?.sns?.facebook) || ''
    }
  };

  if (editingId) {
    const idx = castData.findIndex(x => x.id === editingId);
    if (idx >= 0) castData[idx] = entry;
  } else {
    castData.push(entry);
  }
  closeModal();
  renderGrid();
  } catch(e) {
    alert('保存中にエラーが発生しました:\n' + e.message);
    console.error(e);
  }
}

function deleteCast(id) {
  const c = castData.find(x => x.id === id);
  if (!c || !confirm(`「${c.name}」を削除しますか？`)) return;
  castData = castData.filter(x => x.id !== id);
  renderGrid();
}

// ============================================================
// 保存
// ============================================================
function saveData() {
  const sorted = [...castData].sort((a,b) => (a.order||0)-(b.order||0));
  const content = 'const CAST_DATA = ' + JSON.stringify(sorted, null, 2) + ';\n';
  const blob = new Blob([content], { type: 'text/javascript' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cast-data.js';
  a.click();
  document.getElementById('save-guide').style.display = 'block';
}
</script>
