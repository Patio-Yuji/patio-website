<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パティオ 管理画面</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; color: #333; }

    /* ログイン画面 */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #23222f;
    }
    #login-box {
      background: #fff; border-radius: 12px; padding: 40px;
      width: 340px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    #login-box h1 { font-size: 20px; margin-bottom: 8px; color: #23222f; }
    #login-box p { font-size: 13px; color: #888; margin-bottom: 24px; }
    #login-box input {
      width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 15px; margin-bottom: 12px;
    }
    #login-box button {
      width: 100%; padding: 12px; background: #4bb6c5; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; cursor: pointer;
    }
    #login-box button:hover { background: #3aa0af; }
    #login-error { color: #e74c3c; font-size: 13px; margin-top: 8px; }

    /* メイン画面 */
    #main-screen { display: none; }
    header {
      background: #23222f; color: #fff; padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 18px; }
    header span { font-size: 13px; color: #aaa; }
    .logout-btn {
      background: transparent; border: 1px solid #666; color: #ccc;
      padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
    }

    .toolbar {
      background: #fff; padding: 16px 24px; border-bottom: 1px solid #e0e0e0;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .btn-add {
      background: #4bb6c5; color: #fff; border: none;
      padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px;
      font-weight: bold;
    }
    .btn-add:hover { background: #3aa0af; }
    .btn-save {
      background: #27ae60; color: #fff; border: none;
      padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px;
      font-weight: bold;
    }
    .btn-save:hover { background: #219a52; }
    .search-box {
      padding: 9px 14px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; width: 220px;
    }
    .count-label { font-size: 13px; color: #888; margin-left: auto; }

    /* キャスト一覧 */
    .cast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px; padding: 24px;
    }
    .cast-card {
      background: #fff; border-radius: 10px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s;
    }
    .cast-card:hover { transform: translateY(-2px); }
    .cast-card img {
      width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #eee;
    }
    .cast-card .card-body { padding: 12px; }
    .cast-card .card-name { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
    .cast-card .card-career { font-size: 11px; color: #888; margin-bottom: 10px; line-height: 1.4; }
    .card-actions { display: flex; gap: 6px; }
    .btn-edit {
      flex: 1; padding: 6px; background: #f0f0f0; border: none;
      border-radius: 6px; cursor: pointer; font-size: 12px;
    }
    .btn-edit:hover { background: #e0e0e0; }
    .btn-delete {
      padding: 6px 10px; background: #fdecea; border: none;
      border-radius: 6px; cursor: pointer; font-size: 12px; color: #e74c3c;
    }
    .btn-delete:hover { background: #fad7d3; }

    /* モーダル */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 1000;
      align-items: flex-start; justify-content: center; overflow-y: auto; padding: 40px 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 12px; width: 100%; max-width: 600px;
      padding: 28px; position: relative;
    }
    .modal h2 { font-size: 18px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none; font-size: 22px; cursor: pointer; color: #999;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #555; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px;
    }
    .form-group textarea { height: 60px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .tag-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; border: 1px solid #ddd; border-radius: 8px; min-height: 44px; }
    .tag { background: #e8f4f8; color: #2980b9; padding: 3px 10px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .tag .remove-tag { cursor: pointer; color: #999; font-size: 14px; }
    .tag-input { border: none; outline: none; font-size: 13px; min-width: 80px; padding: 2px; }
    .preview-img { width: 80px; height: 107px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd; margin-top: 8px; background: #f0f0f0; }
    .form-hint { font-size: 11px; color: #999; margin-top: 4px; }
    .modal-footer { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel { padding: 10px 20px; background: #f0f0f0; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-submit { padding: 10px 24px; background: #4bb6c5; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }

    /* 保存後の案内 */
    #save-guide {
      display: none; position: fixed; bottom: 24px; right: 24px;
      background: #27ae60; color: #fff; border-radius: 10px;
      padding: 16px 20px; max-width: 320px; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      font-size: 13px; line-height: 1.6; z-index: 2000;
    }
    #save-guide strong { display: block; font-size: 14px; margin-bottom: 6px; }
    #save-guide .close-guide { float: right; background: none; border: none; color: #fff; cursor: pointer; font-size: 18px; margin-top: -4px; }
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div id="login-box">
    <h1>🔑 パティオ 管理画面</h1>
    <p>パスワードを入力してください</p>
    <input type="password" id="pw-input" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">ログイン</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- メイン画面 -->
<div id="main-screen">
  <header>
    <h1>🎤 パティオ キャスト管理</h1>
    <div style="display:flex;align-items:center;gap:16px;">
      <span id="header-count"></span>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </header>

  <div class="toolbar">
    <button class="btn-add" onclick="openAddModal()">＋ キャストを追加</button>
    <button class="btn-save" onclick="saveData()">💾 cast-data.js を保存</button>
    <input type="text" class="search-box" id="search-input" placeholder="名前・カテゴリで検索..." oninput="renderGrid()">
    <span class="count-label" id="count-label"></span>
  </div>

  <div class="cast-grid" id="cast-grid"></div>
</div>

<!-- 編集・追加モーダル -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-title">キャスト編集</h2>
    <input type="hidden" id="f-id">

    <div class="form-row">
      <div class="form-group">
        <label>名前 *</label>
        <input type="text" id="f-name" placeholder="山田 花子">
      </div>
      <div class="form-group">
        <label>並び順（数字）</label>
        <input type="number" id="f-order" placeholder="0">
      </div>
    </div>

    <div class="form-group">
      <label>カテゴリ（Enterで追加）</label>
      <div class="tag-input-wrap" id="tag-categories" onclick="this.querySelector('.tag-input').focus()">
        <input class="tag-input" placeholder="MC/司会..." onkeydown="addTag(event,'categories')">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>性別</label>
        <select id="f-sex">
          <option value="女性">女性</option>
          <option value="男性">男性</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>年代（Enterで追加）</label>
        <div class="tag-input-wrap" id="tag-ages" onclick="this.querySelector('.tag-input').focus()">
          <input class="tag-input" placeholder="20~30代..." onkeydown="addTag(event,'ages')">
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>対応地域（Enterで追加）</label>
        <div class="tag-input-wrap" id="tag-regions" onclick="this.querySelector('.tag-input').focus()">
          <input class="tag-input" placeholder="関東..." onkeydown="addTag(event,'regions')">
        </div>
      </div>
      <div class="form-group">
        <label>対応言語（Enterで追加）</label>
        <div class="tag-input-wrap" id="tag-languages" onclick="this.querySelector('.tag-input').focus()">
          <input class="tag-input" placeholder="英語..." onkeydown="addTag(event,'languages')">
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>プロフィール写真URL</label>
      <input type="text" id="f-image" placeholder="https://..." oninput="updatePreview()">
      <img id="img-preview" class="preview-img" src="" alt="プレビュー" onerror="this.style.display='none'" style="display:none">
      <p class="form-hint">uploadsフォルダに入れた場合：uploads/2024/01/ファイル名.jpg</p>
    </div>

    <div class="form-group">
      <label>ボイスサンプルURL</label>
      <input type="text" id="f-audio" placeholder="https://...">
    </div>

    <div class="form-group">
      <label>SNS（Instagram）</label>
      <input type="text" id="f-sns-instagram" placeholder="https://www.instagram.com/...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>SNS（Twitter/X）</label>
        <input type="text" id="f-sns-twitter" placeholder="https://twitter.com/...">
      </div>
      <div class="form-group">
        <label>SNS（YouTube）</label>
        <input type="text" id="f-sns-youtube" placeholder="https://youtube.com/...">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-submit" onclick="submitForm()">保存</button>
    </div>
  </div>
</div>

<!-- 保存後の案内 -->
<div id="save-guide">
  <button class="close-guide" onclick="document.getElementById('save-guide').style.display='none'">✕</button>
  <strong>✅ cast-data.js をダウンロードしました</strong>
  次の手順でサイトに反映してください：<br>
  1. ダウンロードしたファイルを <code>js/</code> フォルダに上書き<br>
  2. GitHub Desktop で「Commit」→「Push」
</div>

<script>
// ============================================================
// パスワード設定（変更可能）
// ============================================================
const PASSWORD = 'patio2024';

// ============================================================
// データ
// ============================================================
let castData = [];
let editingId = null;
const tagData = { categories: [], ages: [], regions: [], languages: [] };

// ============================================================
// ログイン
// ============================================================
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').textContent = 'パスワードが違います';
  }
}
function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('pw-input').value = '';
}

// ============================================================
// データ読み込み
// ============================================================
function loadData() {
  if (typeof CAST_DATA !== 'undefined') {
    castData = JSON.parse(JSON.stringify(CAST_DATA));
    renderGrid();
  } else {
    fetch('js/cast-data.js')
      .then(r => r.text())
      .then(text => {
        const json = text.replace(/^const CAST_DATA\s*=\s*/, '').replace(/;\s*$/, '');
        castData = JSON.parse(json);
        renderGrid();
      })
      .catch(() => {
        castData = [];
        renderGrid();
        alert('cast-data.js の読み込みに失敗しました。\nGitHub Pages上か、ローカルサーバー経由で開いてください。');
      });
  }
}

// ============================================================
// 一覧表示
// ============================================================
function renderGrid() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const filtered = q
    ? castData.filter(c =>
        c.name.toLowerCase().includes(q) ||
        (c.career || '').toLowerCase().includes(q) ||
        (c.categories || []).join('').toLowerCase().includes(q)
      )
    : castData;

  document.getElementById('count-label').textContent = `${filtered.length} / ${castData.length} 件`;
  document.getElementById('header-count').textContent = `合計 ${castData.length} 名`;

  const grid = document.getElementById('cast-grid');
  grid.innerHTML = filtered.map(c => `
    <div class="cast-card">
      <img src="${c.image || ''}" alt="${c.name}" onerror="this.style.background='#ddd';this.src=''">
      <div class="card-body">
        <div class="card-name">${c.name}</div>
        <div class="card-career">${(c.categories || []).join(' / ') || c.career || ''}</div>
        <div class="card-actions">
          <button class="btn-edit" onclick="openEditModal(${c.id})">✏️ 編集</button>
          <button class="btn-delete" onclick="deleteCast(${c.id})">🗑</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ============================================================
// タグ操作
// ============================================================
function renderTags(field) {
  const wrap = document.getElementById('tag-' + field);
  const input = wrap.querySelector('.tag-input');
  wrap.querySelectorAll('.tag').forEach(t => t.remove());
  tagData[field].forEach((tag, i) => {
    const el = document.createElement('span');
    el.className = 'tag';
    el.innerHTML = `${tag} <span class="remove-tag" onclick="removeTag('${field}',${i})">×</span>`;
    wrap.insertBefore(el, input);
  });
}
function addTag(event, field) {
  if (event.key !== 'Enter' && event.key !== ',') return;
  event.preventDefault();
  const input = event.target;
  const val = input.value.trim();
  if (val && !tagData[field].includes(val)) {
    tagData[field].push(val);
    renderTags(field);
  }
  input.value = '';
}
function removeTag(field, index) {
  tagData[field].splice(index, 1);
  renderTags(field);
}

// ============================================================
// モーダル
// ============================================================
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'キャストを追加';
  document.getElementById('f-id').value = '';
  document.getElementById('f-name').value = '';
  document.getElementById('f-order').value = '0';
  document.getElementById('f-sex').value = '女性';
  document.getElementById('f-image').value = '';
  document.getElementById('f-audio').value = '';
  document.getElementById('f-sns-instagram').value = '';
  document.getElementById('f-sns-twitter').value = '';
  document.getElementById('f-sns-youtube').value = '';
  document.getElementById('img-preview').style.display = 'none';
  ['categories','ages','regions','languages'].forEach(f => { tagData[f] = []; renderTags(f); });
  document.getElementById('edit-modal').classList.add('open');
}

function openEditModal(id) {
  const c = castData.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'キャスト編集：' + c.name;
  document.getElementById('f-id').value = c.id;
  document.getElementById('f-name').value = c.name || '';
  document.getElementById('f-order').value = c.order ?? 0;
  document.getElementById('f-sex').value = c.sex || '女性';
  document.getElementById('f-image').value = c.image || '';
  document.getElementById('f-audio').value = c.audio || '';
  document.getElementById('f-sns-instagram').value = (c.sns && c.sns.instagram) || '';
  document.getElementById('f-sns-twitter').value = (c.sns && c.sns.twitter) || '';
  document.getElementById('f-sns-youtube').value = (c.sns && c.sns.youtube) || '';
  ['categories','ages','regions','languages'].forEach(f => {
    tagData[f] = [...(c[f] || [])]; renderTags(f);
  });
  updatePreview();
  document.getElementById('edit-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
}

function updatePreview() {
  const url = document.getElementById('f-image').value.trim();
  const img = document.getElementById('img-preview');
  if (url) { img.src = url; img.style.display = 'block'; }
  else { img.style.display = 'none'; }
}

function submitForm() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('名前は必須です'); return; }

  const entry = {
    id: editingId || Date.now(),
    name,
    order: parseInt(document.getElementById('f-order').value) || 0,
    career: tagData.categories.join('、'),
    sex: document.getElementById('f-sex').value,
    ages: [...tagData.ages],
    categories: [...tagData.categories],
    languages: [...tagData.languages],
    regions: [...tagData.regions],
    image: document.getElementById('f-image').value.trim(),
    audio: document.getElementById('f-audio').value.trim(),
    sns: {
      instagram: document.getElementById('f-sns-instagram').value.trim(),
      twitter: document.getElementById('f-sns-twitter').value.trim(),
      youtube: document.getElementById('f-sns-youtube').value.trim(),
      facebook: ''
    }
  };

  if (editingId) {
    const idx = castData.findIndex(x => x.id === editingId);
    if (idx >= 0) castData[idx] = entry;
  } else {
    castData.push(entry);
  }

  closeModal();
  renderGrid();
}

function deleteCast(id) {
  const c = castData.find(x => x.id === id);
  if (!c) return;
  if (!confirm(`「${c.name}」を削除しますか？`)) return;
  castData = castData.filter(x => x.id !== id);
  renderGrid();
}

// ============================================================
// 保存（cast-data.js ダウンロード）
// ============================================================
function saveData() {
  const sorted = [...castData].sort((a, b) => (a.order || 0) - (b.order || 0));
  const content = 'const CAST_DATA = ' + JSON.stringify(sorted, null, 2) + ';\n';
  const blob = new Blob([content], { type: 'text/javascript' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cast-data.js';
  a.click();
  document.getElementById('save-guide').style.display = 'block';
}
</script>
</body>
</html>
